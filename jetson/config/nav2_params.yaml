# RoboCupRescue RMRC 2026 - Nav2 parameters
# Robot footprint 0.27 x 0.25 m; inflation for costmap; DWB controller.

amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_nav_through_poses_bt_xml: ""
    default_nav_to_pose_bt_xml: ""
    plugin_lib_names: []

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.05
      min_vel_y: 0.0
      max_vel_x: 0.3
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      # Robot footprint 0.27 x 0.25 m (length x width)
      footprint: "[[0.135, 0.125], [0.135, -0.125], [-0.135, -0.125], [-0.135, 0.125]]"
      # Cost function weights
      path_distance_bias: 32.0
      goal_distance_bias: 24.0
      occdist_scale: 0.02
      critic_plugins: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint:
        plugin: "dwb_critics::ObstacleFootprintCritic"
        costmap_reader: "costmap"
        footprint: "[[0.135, 0.125], [0.135, -0.125], [-0.135, -0.125], [-0.135, 0.125]]"
      PathAlign:
        plugin: "dwb_critics::PathAlignCritic"
      PathDist:
        plugin: "dwb_critics::PathDistCritic"
      GoalDist:
        plugin: "dwb_critics::GoalDistCritic"
      GoalAlign:
        plugin: "dwb_critics::GoalAlignCritic"
      RotateToGoal:
        plugin: "dwb_critics::RotateToGoalCritic"
      Oscillation:
        plugin: "dwb_critics::OscillationCritic"

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.18
      inflation_radius: 0.18
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        topic: "/cloud_registered"
        frame: "map"
        max_obstacle_height: 2.0
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_observations: 120
        marking: true
        clearing: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.18

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.18
      inflation_radius: 0.18
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
      obstacle_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        topic: "/cloud_registered"
        frame: "map"
        max_obstacle_height: 2.0
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_observations: 120
        marking: true
        clearing: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.18

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      wait_duration: 200

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["controller_server", "planner_server", "recoveries_server", "bt_navigator", "waypoint_follower"]

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries::Spin"
    backup:
      plugin: "nav2_recoveries::BackUp"
    wait:
      plugin: "nav2_recoveries::Wait"
