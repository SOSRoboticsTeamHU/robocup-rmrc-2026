# RoboCupRescue RMRC 2025 - Auto Mission Config
# Use with auto_mission_node.py (--config or env)

# Bay dimensions (robot must fit in 30 cm wide bays; bay length for lap scoring)
bay_length_m: 4.0
bay_width_m: 0.30
bay_axis: "x"   # axis along bay: "x" or "y"

# Wall-follow and end detection
wall_distance_target_m: 0.15   # 10-20 cm from walls (rulebook)
end_wall_threshold_m: 0.30     # RMRC: stop when within 30 cm of end wall
end_wall_cooldown_s: 1.5        # avoid double-counting laps

# Speeds (m/s) - slow on incline/sand
speed_normal_mps: 0.15
speed_slow_mps: 0.08           # incline, sand, stairs
angular_max_rps: 0.4
straight_fallback_mps: 0.12

# Align test
align_angular_rps: 0.15
align_distance_tol_m: 0.05
align_yaw_tol_rad: 0.03

# Safety
mission_timeout_s: 300.0       # 5 min max
stuck_window_samples: 50      # at 10 Hz = 5 s
stuck_min_dist_m: 0.08

# Terrain types that use slow speed (match shared.constants TEST_GROUPS)
slow_terrains:
  - incline_horiz
  - incline_inclined
  - sand_gravel
  - stairs

# ZMQ (must match shared.constants)
zmq_autonomy_port: 5560
zmq_status_port: 5565
